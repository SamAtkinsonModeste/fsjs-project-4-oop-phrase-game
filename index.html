<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Harry Potter | Wizard Word Duel</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Favicon Links -->
	<link rel="apple-touch-icon" sizes="57x57" href="favicon/apple-icon-57x57.png">
	<link rel="apple-touch-icon" sizes="60x60" href="favicon/apple-icon-60x60.png">
	<link rel="apple-touch-icon" sizes="72x72" href="favicon/apple-icon-72x72.png">
	<link rel="apple-touch-icon" sizes="76x76" href="favicon/apple-icon-76x76.png">
	<link rel="apple-touch-icon" sizes="114x114" href="favicon/apple-icon-114x114.png">
	<link rel="apple-touch-icon" sizes="120x120" href="favicon/apple-icon-120x120.png">
	<link rel="apple-touch-icon" sizes="144x144" href="favicon/apple-icon-144x144.png">
	<link rel="apple-touch-icon" sizes="152x152" href="favicon/apple-icon-152x152.png">
	<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-icon-180x180.png">
	<link rel="icon" type="image/png" sizes="192x192" href="favicon/android-icon-192x192.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
	<link rel="manifest" href="favicon/manifest.json">
	<meta name="msapplication-TileColor" content="#ffffff">
	<meta name="msapplication-TileImage" content="favicon/ms-icon-144x144.png">
	<meta name="theme-color" content="#ffffff">
	<!-- Style sheets-->
	<link href="css/styles.css" rel="stylesheet">
	<link href="css/animate.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
</head>

<body>
	<div class="main-container">
		<button id="music-control-Btn">
			<p id="sound-text">Click to mute sound</p>
			<img id="sound-image" src="images/magic-speaker-on.svg">

		</button>
		<div id="overlay" class="welcome">
			<!-- Animation Containers -->
			<div id="animation-container">
				<div id="left-animation"></div>
				<div id="right-animation"></div>
			</div>
			<h2 class="title">Welcome to Hogwarts<br><span class="title-line-2">Begin Your Journey</span></h2>
			<h1 id="game-over-message"></h1>
			<button id="btn__reset">Click To Enter</button>
		</div>

		<div id="banner" class="section">
			<h2 class="header">Phrase Hunter</h2>
		</div>

		<div id="phrase" class="section">
			<ul>
			</ul>
		</div>

		<div id="qwerty" class="section">
			<div class="keyrow">
				<button class="key">q</button>
				<button class="key">w</button>
				<button class="key">e</button>
				<button class="key">r</button>
				<button class="key">t</button>
				<button class="key">y</button>
				<button class="key">u</button>
				<button class="key">i</button>
				<button class="key">o</button>
				<button class="key">p</button>
			</div>

			<div class="keyrow">
				<button class="key">a</button>
				<button class="key">s</button>
				<button class="key">d</button>
				<button class="key">f</button>
				<button class="key">g</button>
				<button class="key">h</button>
				<button class="key">j</button>
				<button class="key">k</button>
				<button class="key">l</button>
			</div>

			<div class="keyrow">
				<button class="key">z</button>
				<button class="key">x</button>
				<button class="key">c</button>
				<button class="key">v</button>
				<button class="key">b</button>
				<button class="key">n</button>
				<button class="key">m</button>
			</div>
		</div>

		<div id="scoreboard" class="section">
			<ol>
				<li class="tries"><img src="images/wands.png" alt="Heart Icon" height="80" width="80"></li>
				<li class="tries"><img src="images/wands.png" alt="Heart Icon" height="80" width="80"></li>
				<li class="tries"><img src="images/wands.png" alt="Heart Icon" height="80" width="80"></li>
				<li class="tries"><img src="images/wands.png" alt="Heart Icon" height="80" width="80"></li>
				<li class="tries"><img src="images/wands.png" alt="Heart Icon" height="80" width="80"></li>
			</ol>
		</div>
	</div>

</body>
<script type="text/javascript" src="js/gsap.min.js"></script>
<script type="text/javascript" src="js/animation.js"></script>
<script type="text/javascript" src="js/Phrase.js"></script>
<script type="text/javascript" src="js/Game.js"></script>
<script type="text/javascript" src="js/app.js"></script>



</html>
